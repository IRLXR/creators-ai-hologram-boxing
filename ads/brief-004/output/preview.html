<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brief 004 — Create a Memory (Review)</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #0a0a0a;
      color: #e8e8e8;
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
      gap: 1.25rem;
    }
    h1 { font-size: 1.1rem; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; color: #aaa; }
    .meta { font-size: 0.85rem; color: #666; text-align: center; max-width: 720px; line-height: 1.5; }
    video {
      width: min(100%, 960px);
      border-radius: 8px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
      background: #111;
    }
    .badge {
      display: inline-block;
      padding: 0.25rem 0.6rem;
      border-radius: 4px;
      background: #2a1f00;
      color: #f0c040;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .chapters {
      width: min(100%, 960px);
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 0.5rem;
    }
    .chapters button {
      background: #151515;
      border: 1px solid #333;
      color: #ccc;
      padding: 0.5rem 0.6rem;
      border-radius: 6px;
      font-size: 0.72rem;
      cursor: pointer;
      text-align: left;
      line-height: 1.3;
    }
    .chapters button:hover { border-color: #5a8; color: #fff; }
    .chapters button strong { display: block; color: #8cf; font-size: 0.68rem; }
  </style>
</head>
<body>
  <span class="badge">Pending approval — not on landing page</span>
  <h1>Brief 004 · Create a Memory</h1>
  <p class="meta">Experience VO v3 — hologram warriors, Wave, the tent, the future · not frame-by-frame · poetic close kept · Jessica + music · 60s</p>
  <video id="v" controls playsinline src="MEMORY-60s-16x9-VO.mp4"></video>
  <div class="chapters" id="chapters"></div>
  <script>
    const shots = [
      [0, "01 Wide arrival"],
      [4, "02 Selfie"],
      [7, "03 Friends walk-in"],
      [10, "04 Couple entering"],
      [12, "05 Popcorn"],
      [16, "06 Family photo"],
      [20, "07 First amazement"],
      [24, "08 Concession wait"],
      [28, "09 Perimeter awe"],
      [32, "10 Wave fight"],
      [40, "11 Celebrating"],
      [44, "12 Leaving"],
      [48, "13 Child turns back"],
      [54, "14 Crane wide"],
      [58, "15 End card"],
    ];
    const v = document.getElementById("v");
    const box = document.getElementById("chapters");
    shots.forEach(([sec, label]) => {
      const b = document.createElement("button");
      b.innerHTML = `<strong>${sec}s</strong>${label}`;
      b.onclick = () => { v.currentTime = sec; v.play(); };
      box.appendChild(b);
    });
  </script>
</body>
</html>
